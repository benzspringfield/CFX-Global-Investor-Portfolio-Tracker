name: Update data daily

# อัปเดตข้อมูลอัตโนมัติทุกวัน แล้ว commit ฐานข้อมูลกลับเข้า repo
# -> Streamlit Cloud จะ redeploy ให้เองเมื่อมี commit ใหม่
on:
  schedule:
    - cron: "0 9 * * *"        # ทุกวัน 09:00 UTC (~16:00 ไทย)
  workflow_dispatch: {}          # กดรันเองได้จากแท็บ Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest data
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          OPENFIGI_API_KEY: ${{ secrets.OPENFIGI_API_KEY }}
        run: |
          python update_data.py
          python backfill_tickers.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portfolios.db data/*.json
          git commit -m "chore: daily data update" || echo "no changes"
          git push
